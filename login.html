<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width>, initial-scale=1.0">
    <title>Bite box</title>
    <script src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap" rel="stylesheet">
     <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
     <link rel="stylesheet" href="style.css">
   <link rel="icon" type="image/x-icon" href="images/favicon_io/favicon.ico"> 
</head>
<body>
    <header>

        <nav>
          <img src="images/logo2.png" alt="logo2" width="180px">
            <ul>
                <li><a href="home.html" class="active">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="bitedeals.html">Bitedeals</a></li>
                <li><a href="cart.html"><i class="fa-solid fa-cart-plus"></i></a></li>
                <li><a href="login.html" class="active"><i class="fa-solid fa-right-to-bracket"></i>Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="auth-container">
        <div class="auth-box">
            <h2>Login to Bitebox</h2>
            <form>
                <input type="email" placeholder="Enter email" id="email"required>
                 <div style="position: relative;">
                    <input type="password" placeholder="Enter password" id="password"  required>
                    <i class="fa-solid fa-eye" onclick="togglepassword()" style="position: absolute; top:20px; right:1px;"> </i>
                 </div>

                
                <button type="button" onclick="login()">Login</button>
                <p><a href="signup.html"> Forgot Password</a></p>
                <p id="error" style="color: red;"></p>
                <p>Don't have an account <a href="signup.html">Signup</a></p>
            </form>
        </div>
    </section>
